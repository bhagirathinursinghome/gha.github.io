      <span class="eyebrow">Section name</span>

    <!-- "Add" button only rendered for full-access users, see script below -->

  <div id="listArea"><!-- table / cards rendered here by JS --></div>

<!-- required on every page that uses popups/toasts -->
<div id="modalRoot"></div>
<div id="toastRoot" class="toast-stack"></div>

<script>
// 1. every page declares its own id, matching menu.js exactly
const PAGE_ID = "REPLACE-WITH-MENU-ID";

let myAccess = null; // { profile, level: "full" | "limited" | "none" }

async function init() {
  myAccess = await getMyAccess(PAGE_ID);
  if (!myAccess.profile) return; // requireActiveUser() already showed a message

  if (myAccess.level === "full") {
    document.getElementById("addBtn").style.display = "inline-flex";
    document.getElementById("addBtn").onclick = openAddModal;
  }

  await loadList();
}

async function loadList() {
  // fetch + render your data here
}

function openAddModal() {
  // use openModal({...}) from common.js — see HOW_TO_ADD_PAGE.md for a full example
}

init();
</script>
