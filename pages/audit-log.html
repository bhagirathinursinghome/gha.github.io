<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Audit Log — Greenfield High Portal</title>
<link rel="stylesheet" href="../assets/css/common.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/menu.js"></script>
<script src="../assets/js/common.js"></script>
</head>
<body>
<div class="page-wrap enter-up">
  <div class="page-header">
    <div>
      <span class="eyebrow">Administration</span>
      <h2>Audit Log</h2>
    </div>
  </div>
  <div id="listArea"></div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot" class="toast-stack"></div>

<script>
const PAGE_ID = "audit-log";

async function init() {
  const { profile, level } = await getMyAccess(PAGE_ID);
  if (!profile) return;
  if (level !== "full") {
    document.getElementById("listArea").innerHTML = `<div class="empty-state"><div class="icon">🔒</div><p>You don't have access to this page.</p></div>`;
    return;
  }

  const area = document.getElementById("listArea");
  const { data, error } = await supabaseClient
    .from("audit_log")
    .select("*")
    .order("changed_at", { ascending: false })
    .limit(200);

  if (error) {
    area.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escapeHtml(error.message)}</p></div>`;
    return;
  }
  if (!data.length) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🕒</div><p>No activity recorded yet.</p></div>`;
    return;
  }

  area.innerHTML = `<div class="table-wrap"><table class="data">
    <thead><tr><th>When</th><th>User</th><th>Action</th><th>Table</th><th>Record</th><th></th></tr></thead>
    <tbody>
      ${data.map(l => `
        <tr>
          <td>${formatDateTime(l.changed_at)}</td>
          <td>${escapeHtml(l.changed_by_username || "—")}</td>
          <td><span class="badge ${l.action === "delete" ? "badge-danger" : l.action === "insert" ? "badge-success" : "badge-neutral"}">${l.action}</span></td>
          <td>${escapeHtml(l.table_name)}</td>
          <td>${escapeHtml(l.record_id)}</td>
          <td><button class="btn btn-sm btn-ghost" data-view="${l.log_id}">View</button></td>
        </tr>
      `).join("")}
    </tbody>
  </table></div>`;

  area.querySelectorAll("[data-view]").forEach(btn => {
    btn.onclick = () => {
      const row = data.find(l => String(l.log_id) === btn.dataset.view);
      openModal({
        title: `${row.action} on ${row.table_name}`,
        subtitle: `${row.changed_by_username || "—"} · ${formatDateTime(row.changed_at)}`,
        wide: true,
        bodyHtml: `
          <div class="field"><label>Before</label><pre style="background:var(--paper);padding:10px;border-radius:8px;overflow:auto;font-size:12px">${escapeHtml(JSON.stringify(row.old_data, null, 2) || "null")}</pre></div>
          <div class="field"><label>After</label><pre style="background:var(--paper);padding:10px;border-radius:8px;overflow:auto;font-size:12px">${escapeHtml(JSON.stringify(row.new_data, null, 2) || "null")}</pre></div>
        `,
        footHtml: `<button class="btn btn-ghost" data-close>Close</button>`
      });
    };
  });
}
init();
</script>
</body>
</html>
